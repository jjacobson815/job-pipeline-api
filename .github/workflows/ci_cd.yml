name: CI/CD Pipeline

on:
  push:
    branches:
      - features
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Run Pytest
        env:
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-dummy-key-for-tests
          GEMINI_API_KEY: dummy-gemini-key
          API_KEY: personal-secret-key-123
        run: |
          pytest

  auto-merge:
    name: Auto-Merge Features to Master
    needs: test
    if: github.ref == 'refs/heads/features' && success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge features into master
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout master
          git merge origin/features --no-ff -m "Auto-merge features branch after passing unit tests [skip ci]"
          git push origin master

  deploy:
    name: Deploy to Google Cloud Run
    needs: test
    if: github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

