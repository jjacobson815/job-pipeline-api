name: Continuous Deployment

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push API Image
        run: |
          docker build -t us-central1-docker.pkg.dev/job-pipeline-prod-jgj99/job-pipeline/api:latest .
          docker push us-central1-docker.pkg.dev/job-pipeline-prod-jgj99/job-pipeline/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy job-pipeline-api \
            --image us-central1-docker.pkg.dev/job-pipeline-prod-jgj99/job-pipeline/api:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},API_KEY=${{ secrets.API_KEY }}"
