# ===========================================================================
# docker-compose.yml — Job Pipeline API
# Spins up the API server, Celery worker, Celery beat, and Redis.
# ===========================================================================

services:
  # --- Redis broker -------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- FastAPI application ------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Celery worker ------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=pipeline
      -E
    env_file:

      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Celery beat (optional scheduled tasks) -----------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app:celery_app beat
      --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Celery Flower (worker monitoring UI) --------------------------------
  celery-flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app:celery_app flower
      --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    restart: unless-stopped

volumes:
  redis_data:

